name: "Phase 1 — 완전판"
description: "Prefecture/DepartureMarket 승격, 태그 vertex 분해, 공동방문·순서 파생, SaleProduct/RP 분리."
version: "0.5"
slot: B

source:
  sqlite: "../graph-study/osaka_subset/graph_hotel_info_osaka.sqlite"

vertices:
  - label: Country
    from: { table: country }
    id: "code"
    properties:
      name: name
      centerLat: center_lat
      centerLng: center_lng

  - label: Prefecture
    from:
      table: city
      distinct: [state_code, state_name, country_code]
    id: "state_code"
    properties:
      stateName: state_name
      countryCode: country_code

  - label: City
    from: { table: city }
    id: "city_code"
    properties:
      cityName: city_name
      englishCityName: english_city_name
      lat: latitude
      lng: longitude
      stateCode: state_code
      countryCode: country_code

  - label: DepartureMarket
    from:
      table: package_product_meta
      distinct: [depCityCd, depCityNm]
    id: "depCityCd"
    properties:
      marketName: depCityNm

  - label: RepresentativeProduct
    from:
      table: package_product_meta
      distinct: [rprsProdCd, prodMstrCd]
    id: "rprsProdCd"
    properties:
      prodMstrCd: prodMstrCd

  - label: SaleProduct
    from: { table: package_product_meta }
    id: "saleProdCd"
    properties:
      saleProdNm: saleProdNm
      prodSbttNm: prodSbttNm
      brndNm: brndNm
      trvlDayCnt: trvlDayCnt
      trvlNgtCnt: trvlNgtCnt

  - label: Attraction
    from: { table: package_attraction }
    id: "id"
    properties:
      landmarkNameKo: landmarkNameKo
      landmarkNameEn: landmarkNameEn
      latitude: latitude
      longitude: longitude
      featureIndoorOutdoorType: featureIndoorOutdoorType
      featureActivityLevel: featureActivityLevel
      featureCostType: featureCostType
      featureSummaryKo: featureSummaryKo

  - label: Hotel
    from: { table: package_hotel }
    id: "id"
    properties:
      name: name
      en_name: en_name
      grade: grade
      rating: rating
      address: address
      addressDepth1En: address_depth1_en
      addressDepth2En: address_depth2_en

  - label: HotelStay
    from: { table: package_hotel_stay }
    id: "'HotelStay:' + sale_prod_cd + ':' + schdDay + ':' + htlCd"
    properties:
      saleProdCd: sale_prod_cd
      schdDay: schdDay
      htlCd: htlCd
      htlKoNm: htlKoNm
      htlEnNm: htlEnNm
      locaDesc: locaDesc
      packageHotelId: package_hotel_id
      matched: "package_hotel_id IS NOT NULL AND package_hotel_id != ''"

  - label: Airport
    from:
      table: package_airport
      distinct: [depAptCd, depAptNm]
    id: "depAptCd"
    properties:
      airportName: depAptNm

  - label: Airline
    from:
      table: package_airport
      distinct: [airlCd, airlNm]
    id: "airlCd"
    properties:
      airlineName: airlNm

  - label: FlightSegment
    from: { table: package_airport }
    id: "'FlightSegment:' + saleProdCd + ':' + segReq"
    properties:
      saleProdCd: saleProdCd
      segReq: segReq

  - label: Theme
    from:
      table: package_attraction
      explode_json: featureThemeTagsJson
      distinct: [$item]
    id: "$item"
    properties:
      code: "$item"

  - label: Mood
    from:
      table: package_attraction
      explode_json: featureMoodTagsJson
      distinct: [$item]
    id: "$item"
    properties:
      code: "$item"

  - label: Season
    from:
      table: package_attraction
      explode_json: featureSeasonalityTagsJson
      distinct: [$item]
    id: "$item"
    properties:
      code: "$item"

edges:
  - type: IN_COUNTRY
    from: { table: city, where: "country_code IS NOT NULL" }
    source: { vertex: City, match_by: city_code }
    target: { vertex: Country, match_by: country_code }

  - type: IN_PREFECTURE
    from: { table: city, where: "state_code IS NOT NULL" }
    source: { vertex: City, match_by: city_code }
    target: { vertex: Prefecture, match_by: state_code }

  - type: ATTRACTION_IN_CITY
    from: { table: package_attraction, where: "cityCode IS NOT NULL" }
    source: { vertex: Attraction, match_by: id }
    target: { vertex: City, match_by: cityCode }

  - type: INSTANCE_OF
    from: { table: package_product_meta }
    source: { vertex: SaleProduct, match_by: saleProdCd }
    target: { vertex: RepresentativeProduct, match_by: rprsProdCd }

  - type: ARRIVES_IN
    from: { table: package_product_meta, where: "arrCityCd IS NOT NULL" }
    source: { vertex: SaleProduct, match_by: saleProdCd }
    target: { vertex: City, match_by: arrCityCd }

  - type: DEPARTS_FROM_MARKET
    from: { table: package_product_meta, where: "depCityCd IS NOT NULL" }
    source: { vertex: SaleProduct, match_by: saleProdCd }
    target: { vertex: DepartureMarket, match_by: depCityCd }

  - type: VISITS_CITY
    from:
      table: package_product_meta
      explode_csv: vistCity
    source: { vertex: SaleProduct, match_by: saleProdCd }
    target: { vertex: City, match_by: "$item" }

  - type: HAS_SCHEDULED_ATTRACTION
    from: { table: package_product_schedules, where: "attractionId IS NOT NULL" }
    source: { vertex: SaleProduct, match_by: saleProdCd }
    target: { vertex: Attraction, match_by: attractionId }
    properties:
      schdDay: schdDay
      visitOrder: schtExprSqc

  - type: HAS_HOTEL_STAY
    from: { table: package_hotel_stay }
    source: { vertex: SaleProduct, match_by: sale_prod_cd }
    target: { vertex: HotelStay, match_by: "'HotelStay:' + sale_prod_cd + ':' + schdDay + ':' + htlCd" }

  - type: MATCHED_TO
    from: { table: package_hotel_stay, where: "package_hotel_id IS NOT NULL AND package_hotel_id != ''" }
    source: { vertex: HotelStay, match_by: "'HotelStay:' + sale_prod_cd + ':' + schdDay + ':' + htlCd" }
    target: { vertex: Hotel, match_by: package_hotel_id }

  - type: HAS_FLIGHT_SEGMENT
    from: { table: package_airport }
    source: { vertex: SaleProduct, match_by: saleProdCd }
    target: { vertex: FlightSegment, match_by: "'FlightSegment:' + saleProdCd + ':' + segReq" }

  - type: DEPARTS_FROM
    from: { table: package_airport, where: "depAptCd IS NOT NULL" }
    source: { vertex: FlightSegment, match_by: "'FlightSegment:' + saleProdCd + ':' + segReq" }
    target: { vertex: Airport, match_by: depAptCd }

  - type: ARRIVES_AT
    from: { table: package_airport, where: "arrAptCd IS NOT NULL" }
    source: { vertex: FlightSegment, match_by: "'FlightSegment:' + saleProdCd + ':' + segReq" }
    target: { vertex: Airport, match_by: arrAptCd }

  - type: OPERATED_BY
    from: { table: package_airport, where: "airlCd IS NOT NULL" }
    source: { vertex: FlightSegment, match_by: "'FlightSegment:' + saleProdCd + ':' + segReq" }
    target: { vertex: Airline, match_by: airlCd }

  - type: HAS_THEME
    from:
      table: package_attraction
      explode_json: featureThemeTagsJson
    source: { vertex: Attraction, match_by: id }
    target: { vertex: Theme, match_by: "$item" }

  - type: HAS_MOOD
    from:
      table: package_attraction
      explode_json: featureMoodTagsJson
    source: { vertex: Attraction, match_by: id }
    target: { vertex: Mood, match_by: "$item" }

  - type: HAS_SEASONALITY
    from:
      table: package_attraction
      explode_json: featureSeasonalityTagsJson
    source: { vertex: Attraction, match_by: id }
    target: { vertex: Season, match_by: "$item" }

derived:
  - type: CO_VISITED
    kind: attraction_co_occurrence
    params:
      table: package_product_schedules
      group_by: saleProdCd
      pair_column: attractionId
      support_min: 3

  - type: VISITED_AFTER
    kind: attraction_sequence
    params:
      table: package_product_schedules
      partition_by: [saleProdCd, schdDay]
      order_by: schtExprSqc
      item_column: attractionId
      support_min: 3

  - type: NEAR_CITY
    kind: haversine
    params:
      vertex: City
      lat_prop: latitude
      lng_prop: longitude
      threshold_km: 100

  - type: OFTEN_COTRAVELED
    kind: list_co_occurrence
    params:
      table: package_product_meta
      list_column: vistCity
      separator: ","
      support_min: 2

options:
  batch_size: 100
